name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test-linux:
    name: Build and Test (Linux, LLVM ${{ matrix.llvm }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        llvm: [20, 21, 22]
        include:
          - llvm: 20
            image: ghcr.io/smartai/llvm-qt-dev-env:fedora-llvm20
          - llvm: 21
            image: ghcr.io/smartai/llvm-qt-dev-env:fedora-llvm21
          - llvm: 22
            image: ghcr.io/smartai/llvm-qt-dev-env:fedora-llvm22
    container:
      image: ${{ matrix.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        run: cd build && ctest --output-on-failure -j$(nproc)
